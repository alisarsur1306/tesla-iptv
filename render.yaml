services:
  - type: web
    name: tesla-iptv
    runtime: node
    plan: free
    # Tailscale static binaries are fetched at build time so the start command can
    # bring up an exit node — the Xtream host blocks Render's datacenter IPs.
    buildCommand: npm install && npm run build && ./fetch-tailscale.sh
    startCommand: ./render-start.sh
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: XTREAM_SERVER
        sync: false
      - key: XTREAM_USERNAME
        sync: false
      - key: XTREAM_PASSWORD
        sync: false
      - key: ACCESS_KEY
        sync: false
      # Leave TS_* unset to run without an exit node (upstream will be blocked by
      # Cloudflare, but the app still boots and serves the UI).
      - key: TS_AUTHKEY
        sync: false
      - key: TS_EXIT_NODE
        sync: false
